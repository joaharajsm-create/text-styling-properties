<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text transform</title>
    <style>
        div{
            width: 400px;
            height: 200px;
            background-color: rgba(0, 183, 255, 0.986);
            border: 1px solid black;
        }
        #myid{
            transform: rotateX(180deg)
        }
    </style>
</head>
<body>
    <h1>welcome to codingal</h1>
    <p>ready to learn the rotate method...</p>
     <div style="color:indigo;">
    codingal
     </div>
     <div id="myid">
    codingal
     </div>
</body>
</html>
