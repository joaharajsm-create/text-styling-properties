<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>indent,shadow,box</title>
    <style>
        *{
            text-align: center;
            font-family: monospace;
        }
        #text{
            text-shadow: 2px 2px 1px indigo;
        }
        #box{
            box-shadow: 9px 9px 5px #301934;
        }
        #indent{
             text-indent: 50%;
        }
    </style>
</head>
<body>
    <h1 id="text">we can use text-shadow to give shadow to itself</h1>
    <h1 id="box">we can also use text-box shadow</h1>
    <h1 id="indent">this is to show how text-indent works</h1>
</body>
</html>
